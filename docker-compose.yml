# docker-compose for VPS deployment.
# Run on the VPS:
#   cp backend/.env.example backend/.env  (then edit CORS_ORIGINS, JWT_SECRET, etc.)
#   docker compose up -d --build
#   docker compose exec api npm run migrate      # or `npm run db:push` for dev
#   docker compose exec api npm run seed         # prints the initial admin password ONCE
#
# Then point Nginx at (both bound to 127.0.0.1 only — never exposed publicly):
#   web → http://127.0.0.1:3000
#   api → http://127.0.0.1:4000

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      # MUST be set in a top-level .env (next to docker-compose.yml) before
      # deploying. Generate one with: openssl rand -base64 32
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env before running docker compose up}
      POSTGRES_DB: sidi_elhani
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Local-only. If you don't need psql from the host, remove this section entirely.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d sidi_elhani"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    # Local-only — only nginx should expose the API publicly.
    ports:
      - "127.0.0.1:4000:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      args:
        # Public API base URL the browser uses (through Nginx).
        VITE_API_URL: https://your-domain.tn/api
    restart: unless-stopped
    # Local-only — nginx proxies public traffic to this.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
